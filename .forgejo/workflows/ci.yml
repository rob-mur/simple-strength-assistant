name: CI

on:
  pull_request:

x-devenv: &devenv
  runs-on: docker
  container:
    image: ghcr.io/cachix/devenv/devenv:v1.11.1
    volumes:
      - /tmp/devenv-cache:/tmp/devenv-cache

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  lint:
    <<: *devenv
    steps:
      - name: Link persistent cache
        shell: bash
        run: |
          rm -rf /home/devenv/.cache 2>/dev/null || true
          ln -sf /tmp/devenv-cache /home/devenv/.cache

      - name: Checkout
        shell: bash
        run: |
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          REPO_URL="https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git clone --branch="${BRANCH}" "${REPO_URL}" .
          git fetch origin "${GITHUB_BASE_REF}" --depth=1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install npm dependencies
        run: npm ci

      - name: Run linting checks
        run: lint
        env:
          FORGEJO_ACTIONS: "true"
          BASE_SHA: ${{ gitea.event.pull_request.base.sha }}
          HEAD_SHA: ${{ gitea.event.pull_request.head.sha }}

name: CI

on:
  pull_request:

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  lint:
    runs-on: docker
    container:
      image: ghcr.io/cachix/devenv/devenv:v1.11.1
      volumes:
        - /var/cache/forgejo-devenv:/home/devenv/.cache
    steps:
      - name: Probe bash
        shell: bash
        run: |
          echo "probe bash $(id -un)"

      - name: Probe devenv default
        run: |
          echo "probe devenv default $(id -un)"

name: CI
# Forgejo Actions workflow for simple-strength-assistant

on:
  pull_request:

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  lint:
    runs-on: nix-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm ci

      - name: Run linting checks
        run: lint
        env:
          FORGEJO_ACTIONS: "true"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  test:
    runs-on: nix-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Rust tests
        run: cargo test

  fast-test:
    runs-on: nix-host
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Run fast Playwright tests
        run: |
          DX_LOG=$(mktemp)
          dx serve --port 3000 > "$DX_LOG" 2>&1 &
          DX_PID=$!
          echo "Waiting for dx serve to build and serve WASM..."
          for i in $(seq 1 120); do
            if grep -q "Build completed successfully" "$DX_LOG" 2>/dev/null; then
              echo "Build completed after $((i * 5))s"
              break
            fi
            if grep -q "Build failed" "$DX_LOG" 2>/dev/null; then
              echo "Build failed:"
              cat "$DX_LOG"
              exit 1
            fi
            if ! kill -0 $DX_PID 2>/dev/null; then
              echo "dx serve exited unexpectedly:"
              cat "$DX_LOG"
              exit 1
            fi
            if [ $i -eq 120 ]; then
              echo "Timed out waiting for WASM build (600s):"
              cat "$DX_LOG"
              exit 1
            fi
            sleep 5
          done
          npx bddgen --config playwright.fast.config.ts
          npx playwright test --config playwright.fast.config.ts

  e2e-test:
    runs-on: nix-host
    needs: [build-and-deploy]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run Playwright E2E tests
        run: |
          npx bddgen
          npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ env.VERCEL_AUTOMATION_BYPASS_SECRET }}

  claude-review:
    runs-on: nix-host
    needs: [lint, test, fast-test]
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Run Claude review
        id: review
        run: |
          DELIMITER=$(uuidgen)
          REVIEW=$(claude -p \
            --max-budget-usd 1 \
            "Review PR #${PR_NUMBER} on this repo. The PR title is: ${PR_TITLE}

          Use git diff origin/main...HEAD to see the changes, and explore the surrounding codebase as needed to understand context.

          Provide a concise code review focusing on bugs, security issues, and significant design concerns. Skip style nits.")
          {
            echo "REVIEW_BODY<<${DELIMITER}"
            echo "$REVIEW"
            echo "${DELIMITER}"
          } >> "$GITHUB_ENV"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Post review as PR comment
        if: ${{ env.REVIEW_BODY != '' }}
        run: |
          COMMENT_BODY=$(jq -n --arg body "$REVIEW_BODY" '{body: $body}')
          curl -Sf -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_BODY" \
            "${FORGEJO_URL}/api/v1/repos/${REPO}/issues/${PR_NUMBER}/comments"
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FORGEJO_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}

  build-and-deploy:
    runs-on: nix-host
    outputs:
      deployment-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm ci

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build project
        run: build

      - name: Inject SYNC_BASE_URL into build output
        run: bash scripts/inject-sync-url.sh dist/public/index.html

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(npx vercel \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID \
            -m gitCommitSha=${{ github.sha }} \
            -m gitCommitAuthorName="${{ github.actor }}" \
            -m gitCommitAuthorLogin="${{ github.actor }}" \
            -m gitDeployment=1 \
            -m gitOrg="${{ github.repository_owner }}" \
            -m gitRepo="${{ github.event.repository.name }}" \
            -m gitCommitMessage="$(git log -1 --pretty=format:"%s")" \
            -m gitCommitRef="${{ github.ref_name }}" \
            ./dist/public)
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"

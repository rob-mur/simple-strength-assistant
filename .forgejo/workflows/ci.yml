name: CI

on:
  pull_request:

x-devenv: &devenv
  runs-on: docker
  container:
    image: ghcr.io/cachix/devenv/devenv:v1.11.1
    volumes:
      - /tmp/devenv-cache:/tmp/devenv-cache
      - /var/lib/devenv-nix-cache:/nix

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  lint:
    <<: *devenv
    steps:
      - name: Setup caches and checkout
        shell: bash
        run: |
          rm -rf /home/devenv/.cache 2>/dev/null || true
          ln -sf /tmp/devenv-cache /home/devenv/.cache
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth=1 --branch="${BRANCH}" \
            "https://x-access-token:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install npm dependencies
        run: npm ci

      - name: Run linting checks
        run: lint
        env:
          FORGEJO_ACTIONS: "true"
          BASE_SHA: ${{ gitea.event.pull_request.base.sha }}
          HEAD_SHA: ${{ gitea.event.pull_request.head.sha }}

name: CI

on:
  pull_request:

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  lint:
    runs-on: nix-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm ci

      - name: Run linting checks
        run: lint
        env:
          FORGEJO_ACTIONS: "true"
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  test:
    runs-on: nix-host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Rust tests
        run: cargo test

  fast-test:
    runs-on: nix-host
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Run fast Playwright tests
        run: |
          DX_LOG=$(mktemp)
          dx serve --port 3000 > "$DX_LOG" 2>&1 &
          DX_PID=$!
          echo "Waiting for dx serve to build and serve WASM..."
          for i in $(seq 1 120); do
            if grep -q "Build completed successfully" "$DX_LOG" 2>/dev/null; then
              echo "Build completed after $((i * 5))s"
              break
            fi
            if grep -q "Build failed" "$DX_LOG" 2>/dev/null; then
              echo "Build failed:"
              cat "$DX_LOG"
              exit 1
            fi
            if ! kill -0 $DX_PID 2>/dev/null; then
              echo "dx serve exited unexpectedly:"
              cat "$DX_LOG"
              exit 1
            fi
            if [ $i -eq 120 ]; then
              echo "Timed out waiting for WASM build (600s):"
              cat "$DX_LOG"
              exit 1
            fi
            sleep 5
          done
          npx bddgen --config playwright.fast.config.ts
          npx playwright test --config playwright.fast.config.ts

  build-and-deploy:
    runs-on: nix-host
    outputs:
      deployment-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install npm dependencies
        run: npm ci

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build project
        run: build

      - name: Inject SYNC_BASE_URL into build output
        run: bash scripts/inject-sync-url.sh dist/public/index.html

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(npx vercel \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID \
            -m gitCommitSha=${{ github.sha }} \
            -m gitCommitAuthorName="${{ github.actor }}" \
            -m gitCommitAuthorLogin="${{ github.actor }}" \
            -m gitDeployment=1 \
            -m gitOrg="${{ github.repository_owner }}" \
            -m gitRepo="${{ github.event.repository.name }}" \
            -m gitCommitMessage="$(git log -1 --pretty=format:"%s")" \
            -m gitCommitRef="${{ github.ref_name }}" \
            ./dist/public)
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"

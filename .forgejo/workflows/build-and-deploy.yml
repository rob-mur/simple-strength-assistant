name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: "Git ref to checkout (branch, tag, or commit SHA)"
        required: true
        type: string
        default: "main"
      vercel-environment:
        description: "Vercel deployment environment (production or preview)"
        required: true
        type: string
        default: "preview"
      build-command:
        description: "devenv build script to run (default: 'build')"
        required: false
        type: string
        default: "build"

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  build-and-deploy:
    runs-on: nix-host

    outputs:
      deployment-url: ${{ steps.deploy.outputs.preview-url }}
      artifact-name: ${{ steps.artifact-info.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-ref }}
          fetch-depth: 0

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build project
        run: ${{ inputs.build-command }}

      - name: Inject SYNC_BASE_URL into build output
        run: bash scripts/inject-sync-url.sh dist/public/index.html

      - name: Set artifact name
        id: artifact-info
        shell: bash
        run: echo "name=build-${{ inputs.build-command }}-${{ inputs.git-ref }}-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(npx vercel \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID \
            ${{ inputs.vercel-environment == 'production' && '--prod' || '' }} \
            -m gitCommitSha=${{ github.sha }} \
            -m gitCommitAuthorName="${{ github.actor }}" \
            -m gitCommitAuthorLogin="${{ github.actor }}" \
            -m gitDeployment=1 \
            -m gitOrg="${{ github.repository_owner }}" \
            -m gitRepo="${{ github.event.repository.name }}" \
            -m gitCommitMessage="$(git log -1 --pretty=format:"%s")" \
            -m gitCommitRef="${{ github.ref_name }}" \
            ./dist/public)
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"

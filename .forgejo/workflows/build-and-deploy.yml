name: Build and Deploy

on:
  workflow_call:
    inputs:
      git-ref:
        description: "Git ref to checkout (branch, tag, or commit SHA)"
        required: true
        type: string
      vercel-environment:
        description: "Vercel deployment environment (production or preview)"
        required: true
        type: string
      build-command:
        description: "devenv build script to run (default: 'build')"
        required: false
        type: string
        default: "build"
    outputs:
      deployment-url:
        description: "Vercel deployment URL"
        value: ${{ jobs.build-and-deploy.outputs.deployment-url }}
      build-artifact-name:
        description: "Name of the uploaded build artifact"
        value: ${{ jobs.build-and-deploy.outputs.artifact-name }}

defaults:
  run:
    shell: devenv shell bash -- -e {0}

jobs:
  build-and-deploy:
    runs-on: docker
    container:
      image: ghcr.io/cachix/devenv/devenv:v1.11.1
      volumes:
        - /tmp/devenv-cache:/tmp/devenv-cache
        - /var/lib/devenv-nix-cache:/nix

    outputs:
      deployment-url: ${{ steps.deploy.outputs.preview-url }}
      artifact-name: ${{ steps.artifact-info.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git-ref }}
          fetch-depth: 0

      - name: Setup devenv
        uses: ./.forgejo/actions/setup-devenv

      - name: Decrypt secrets
        shell: bash
        run: |
          eval "$(devenv shell sops --decrypt --output-type dotenv secrets.yaml | sed 's/^/export /')"
          echo "VERCEL_TOKEN=$VERCEL_TOKEN" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=$VERCEL_ORG_ID" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID" >> "$GITHUB_ENV"
          echo "SYNC_BASE_URL=$SYNC_BASE_URL" >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build project
        run: ${{ inputs.build-command }}

      - name: Inject SYNC_BASE_URL into build output
        run: bash scripts/inject-sync-url.sh dist/public/index.html

      - name: Set artifact name
        id: artifact-info
        shell: bash
        run: echo "name=build-${{ inputs.build-command }}-${{ inputs.git-ref }}-${{ gitea.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(npx vercel \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID \
            ${{ inputs.vercel-environment == 'production' && '--prod' || '' }} \
            -m gitCommitSha=${{ gitea.sha }} \
            -m gitCommitAuthorName="${{ gitea.actor }}" \
            -m gitCommitAuthorLogin="${{ gitea.actor }}" \
            -m gitDeployment=1 \
            -m gitOrg="${{ gitea.repository_owner }}" \
            -m gitRepo="${{ gitea.event.repository.name }}" \
            -m gitCommitMessage="$(git log -1 --pretty=format:"%s")" \
            -m gitCommitRef="${{ gitea.ref_name }}" \
            ./dist/public)
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"

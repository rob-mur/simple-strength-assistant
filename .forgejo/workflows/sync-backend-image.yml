name: Build and Push Sync Backend Image

on:
  push:
    branches: [main]
    paths:
      - "sync-backend/**"
  workflow_dispatch:

env:
  REGISTRY: forgejo.clarob.uk
  IMAGE_NAME: ${{ gitea.repository_owner }}/sync-backend

jobs:
  build-and-push:
    runs-on: nix-host

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decrypt secrets
        shell: devenv shell bash -- -e {0}
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Log in to Forgejo container registry
        run: echo "$FORGEJO_REGISTRY_PASSWORD" | podman login "${{ env.REGISTRY }}" -u "$FORGEJO_REGISTRY_USER" --password-stdin

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo '${{ gitea.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build container image
        run: podman build -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}" -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" sync-backend

      - name: Push container image
        run: |
          podman push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}"
          podman push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

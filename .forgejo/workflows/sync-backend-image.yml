name: Build and Push Sync Backend Image

on:
  push:
    branches: [main]
    paths:
      - "sync-backend/**"
  workflow_dispatch:

defaults:
  run:
    shell: devenv shell bash -- -e {0}

env:
  REGISTRY: forgejo.clarob.uk
  IMAGE_NAME: ${{ github.repository_owner }}/sync-backend

jobs:
  build-and-push:
    runs-on: nix-host

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decrypt secrets
        run: sops --decrypt --output-type dotenv secrets.yaml >> "$GITHUB_ENV"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Forgejo container registry
        run: echo "$FORGEJO_REGISTRY_PASSWORD" | buildah login -u "$FORGEJO_REGISTRY_USER" --password-stdin "${{ env.REGISTRY }}"

      - name: Build container image
        run: |
          buildah bud \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            sync-backend

      - name: Push container image
        run: |
          buildah push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}"
          buildah push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
